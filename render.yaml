databases:
  - name: pharmanexus-postgres
    plan: starter
    databaseName: pharmanexus
    user: pharma

services:
  - type: web
    name: pharmanexus-api
    env: python
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: FLASK_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: pharmanexus-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER
        sync: false
      - key: SOCKETIO_MESSAGE_QUEUE
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: AUTH_JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  - type: worker
    name: pharmanexus-celery-worker
    env: python
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A celery_worker worker --loglevel=info --concurrency=4
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: FLASK_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: pharmanexus-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER
        sync: false
      - key: SOCKETIO_MESSAGE_QUEUE
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: AUTH_JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: worker
    name: pharmanexus-celery-beat
    env: python
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A celery_worker beat --loglevel=info
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: FLASK_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: pharmanexus-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER
        sync: false
      - key: SOCKETIO_MESSAGE_QUEUE
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: AUTH_JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
