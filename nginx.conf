events {}

http {
    server {
        listen 80;

        # Route standard web traffic to the Vite frontend
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Route WebSocket traffic natively so SocketIO can stream Financial and Sensitivity updates
        location /socket.io {
            proxy_pass http://backend:5000/socket.io;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }
        
        # Route explicit API endpoints
        location = /api/strategies {
            proxy_pass http://node-backend:5050/api/strategies;
            proxy_set_header Host $host;
        }

        location = /api/analysis {
            proxy_pass http://node-backend:5050/api/analysis;
            proxy_set_header Host $host;
        }

        location = /api/contact {
            proxy_pass http://node-backend:5050/api/contact;
            proxy_set_header Host $host;
        }

        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://backend:5000;
            proxy_set_header Host $host;
        }
    }
}
