services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: novacura-postgres
    environment:
      POSTGRES_DB: pharmanexus
      POSTGRES_USER: pharma
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - novacura-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharma -d pharmanexus"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Message Queue
  redis:
    image: redis:7-alpine
    container_name: novacura-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - novacura-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Flask Backend API
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: novacura-backend
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://pharma:password@postgres:5432/pharmanexus}
      - CELERY_BROKER=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/1
      - REDIS_URL=${REDIS_URL:-redis://:${REDIS_PASSWORD:-password}@redis:6379/0}
      - SOCKETIO_MESSAGE_QUEUE=${SOCKETIO_MESSAGE_QUEUE:-redis://:${REDIS_PASSWORD:-password}@redis:6379/0}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-replace-with-32-char-min-secret-key}
    volumes:
      - ./backend:/app
      - ./chembl_cache:/app/chembl_cache
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - novacura-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Node Backend API (Landing Endpoints)
  node-backend:
    build:
      context: .
      dockerfile: node-backend/Dockerfile
    container_name: novacura-node-backend
    environment:
      - PORT=5050
      - DATABASE_URL=${DATABASE_URL:-postgresql://pharma:password@postgres:5432/pharmanexus}
      - SECRET_KEY=${SECRET_KEY:-replace-with-32-char-min-secret-key}
    volumes:
      - ./node-backend:/app
      - /app/node_modules
    ports:
      - "5051:5050"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - novacura-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5050/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # pgAdmin
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: novacura-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@pharmanexus.local
      - PGADMIN_DEFAULT_PASSWORD=admin123
      - PGADMIN_CONFIG_SERVER_MODE=False
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - novacura-network
    restart: unless-stopped

  # Streamlit Frontend
  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    container_name: novacura-streamlit
    environment:
      - API_BASE_URL=http://backend:5000
    volumes:
      - ./frontend:/app
      - ./app.py:/app/app.py
    ports:
      - "8501:8501"
    depends_on:
      - backend
    networks:
      - novacura-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Celery Worker (Background Jobs)
  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: novacura-celery
    command: celery -A celery_worker worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://pharma:password@postgres:5432/pharmanexus}
      - CELERY_BROKER=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/1
      - REDIS_URL=${REDIS_URL:-redis://:${REDIS_PASSWORD:-password}@redis:6379/0}
      - SOCKETIO_MESSAGE_QUEUE=${SOCKETIO_MESSAGE_QUEUE:-redis://:${REDIS_PASSWORD:-password}@redis:6379/0}
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    networks:
      - novacura-network
    restart: unless-stopped

  # Celery Beat Scheduler
  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: novacura-celery-beat
    command: celery -A celery_worker beat --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://pharma:password@postgres:5432/pharmanexus}
      - CELERY_BROKER=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/1
      - REDIS_URL=${REDIS_URL:-redis://:${REDIS_PASSWORD:-password}@redis:6379/0}
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    networks:
      - novacura-network
    restart: unless-stopped

  # Flower Monitoring
  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: novacura-flower
    command: celery -A celery_worker flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-flower123}
    environment:
      - CELERY_BROKER=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/1
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks:
      - novacura-network
    restart: unless-stopped

  # Prometheus Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: novacura-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend
    networks:
      - novacura-network
    restart: unless-stopped

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: novacura-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards/json:ro
      - ./monitoring/grafana/dashboards/nexuscliniq.json:/var/lib/grafana/dashboards/nexuscliniq.json:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - novacura-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: novacura-nginx
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - node-backend
      - streamlit
    networks:
      - novacura-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  grafana_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  novacura-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
