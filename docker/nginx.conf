events {
    worker_connections 1024;
}

http {
    upstream backend   { server backend:5000; }
    upstream node_backend { server node-backend:5050; }
    upstream streamlit { server streamlit:8501; }
    upstream flower { server flower:5555; }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=predict:10m rate=30r/m;

    # Gzip compression
    gzip on;
    gzip_types application/json text/plain application/javascript text/css;
    gzip_min_length 1000;
    gzip_proxied any;

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # API routes → Flask
        location = /api/strategies {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://node_backend/api/strategies;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /api/analysis {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://node_backend/api/analysis;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /api/contact {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://node_backend/api/contact;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://backend/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;

            # WebSocket upgrade
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # Predict endpoint — stricter rate limit
        location /api/predict {
            limit_req zone=predict burst=10 nodelay;
            proxy_pass http://backend/predict;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Streamlit UI → /
        location / {
            proxy_pass       http://streamlit;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Streamlit WebSocket
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # Streamlit static assets
        location /_stcore/ {
            proxy_pass http://streamlit/_stcore/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # Streamlit health check
        location /_stcore/health {
            proxy_pass http://streamlit/_stcore/health;
            access_log off;
        }

        # Health check (no rate limit)
        location /health {
            proxy_pass http://backend/health;
            access_log off;
        }

        # Flower monitoring
        location /flower/ {
            proxy_pass http://flower/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
